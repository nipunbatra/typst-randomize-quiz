name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  TYPST_VERSION: "0.14.2"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Typst
        run: |
          curl -fsSL "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" | tar -xJ
          echo "$PWD/typst-x86_64-unknown-linux-musl" >> "$GITHUB_PATH"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - name: Run test suite (includes cross-platform golden checks)
        run: python -m pytest tests -q

  site:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Typst
        run: |
          curl -fsSL "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" | tar -xJ
          echo "$PWD/typst-x86_64-unknown-linux-musl" >> "$GITHUB_PATH"
      - name: Build gallery exams and previews
        run: |
          set -euo pipefail
          mkdir -p _site/assets _site/pdf
          cp site/index.html _site/

          build_one () { # <exam file> <exam id> <sets...>
            local f="$1" id="$2"; shift 2
            python3 scripts/build.py "$f" --sets "$@"
            cp "build/$id/set-A.pdf" "_site/pdf/$id-set-A.pdf"
            cp "build/$id/set-A-key.pdf" "_site/pdf/$id-set-A-key.pdf"
          }
          build_one exams/quiz3.typ            es335-quiz-1       A B C D
          build_one exams/quiz4-ml23.typ       es335-2023-archive A B
          build_one exams/demo-physics.typ     ph101-demo         A B
          build_one exams/demo-chemistry.typ   ch101-demo         A B
          build_one exams/demo-algorithms.typ  cs201-demo         A B
          build_one exams/demo-linear-algebra.typ ma102-demo      A B
          build_one exams/demo-economics.typ   ec101-demo         A B
          cp build/es335-quiz-1/answer_key.csv _site/pdf/answer_key.csv

          png () { # <exam file> <prefix> <mode> <pages>
            typst compile "$1" "_site/assets/$2-{p}.png" \
              --root . --format png --pages "$4" --ppi 110 --input set=A --input "mode=$3"
          }
          png exams/quiz3.typ            es335-quiz-1-exam       exam 1-2
          png exams/quiz3.typ            es335-quiz-1-key        key  2
          png exams/quiz4-ml23.typ       es335-2023-archive-key  key  2
          png exams/demo-physics.typ     ph101-demo-exam         exam 1
          png exams/demo-chemistry.typ   ch101-demo-key          key  1
          png exams/demo-algorithms.typ  cs201-demo-exam         exam 1
          png exams/demo-linear-algebra.typ ma102-demo-key       key  1
          png exams/demo-economics.typ   ec101-demo-exam         exam 1
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
